# =============================================================================
# Aegis — Docker Compose (Development)
# =============================================================================
# Infrastructure services for the personal intelligence platform.
# Zero host port bindings — all access via Cloudflare Tunnel.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 + pgvector — primary data store
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aegis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-aegis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aegis}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis 7.4 — task broker + caching + pub/sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Qdrant — vector database for RAG embeddings
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aegis}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

  # ---------------------------------------------------------------------------
  # Traefik v3 — internal reverse proxy / service router
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    volumes:
      - ./infrastructure/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infrastructure/traefik/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certs
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # OpenClaw Gateway — multi-channel AI chat interface
  # https://github.com/openclaw/openclaw
  # ---------------------------------------------------------------------------
  openclaw-gateway:
    build:
      context: ./openclaw
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    networks:
      - backend
      - frontend
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "lan",
        "--port",
        "18789",
      ]
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://localhost:18789/health\",(r)=>{process.exit(r.statusCode===200?0:1)}).on(\"error\",()=>process.exit(1))'"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ---------------------------------------------------------------------------
  # API — FastAPI application server
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aegis}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aegis}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:?ENCRYPTION_MASTER_KEY is required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      SCHWAB_APP_KEY: ${SCHWAB_APP_KEY:-}
      SCHWAB_APP_SECRET: ${SCHWAB_APP_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      X_API_KEY: ${X_API_KEY:-}
      X_API_SECRET: ${X_API_SECRET:-}
      X_BEARER_TOKEN: ${X_BEARER_TOKEN:-}
      LINKEDIN_ACCESS_TOKEN: ${LINKEDIN_ACCESS_TOKEN:-}
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      DAILY_PROTEIN_TARGET_G: ${DAILY_PROTEIN_TARGET_G:-175}
      DAILY_CALORIE_LIMIT: ${DAILY_CALORIE_LIMIT:-1900}
      QDRANT_URL: http://qdrant:6333
      ENVIRONMENT: ${ENVIRONMENT:-development}
    networks:
      - frontend
      - backend
      - data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`) || PathPrefix(`/health`) || PathPrefix(`/docs`) || PathPrefix(`/openapi.json`)"
      - "traefik.http.routers.api.priority=10"
      - "traefik.http.routers.api.middlewares=security-headers@file,rate-limit-global@file,compress@file,strip-server@file"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ---------------------------------------------------------------------------
  # Worker — Celery task runner
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aegis}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aegis}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      SCHWAB_APP_KEY: ${SCHWAB_APP_KEY:-}
      SCHWAB_APP_SECRET: ${SCHWAB_APP_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      X_API_KEY: ${X_API_KEY:-}
      X_API_SECRET: ${X_API_SECRET:-}
      X_ACCESS_TOKEN: ${X_ACCESS_TOKEN:-}
      X_ACCESS_TOKEN_SECRET: ${X_ACCESS_TOKEN_SECRET:-}
      LINKEDIN_ACCESS_TOKEN: ${LINKEDIN_ACCESS_TOKEN:-}
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
      GARMIN_EMAIL: ${GARMIN_EMAIL:-}
      GARMIN_PASSWORD: ${GARMIN_PASSWORD:-}
      QDRANT_URL: http://qdrant:6333
      DAILY_PROTEIN_TARGET_G: ${DAILY_PROTEIN_TARGET_G:-175}
      DAILY_CALORIE_LIMIT: ${DAILY_CALORIE_LIMIT:-1900}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    networks:
      - backend
      - data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # Beat — Celery scheduler
  # ---------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.worker
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aegis}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aegis}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # Console — Next.js web dashboard
  # ---------------------------------------------------------------------------
  console:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.console
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ""
      HOSTNAME: "0.0.0.0"
    networks:
      - frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.console.rule=PathPrefix(`/`)"
      - "traefik.http.routers.console.priority=1"
      - "traefik.http.routers.console.middlewares=security-headers@file,compress@file,strip-server@file"
      - "traefik.http.services.console.loadbalancer.server.port=3000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://127.0.0.1:3000\",(r)=>{process.exit(r.statusCode===200?0:1)}).on(\"error\",()=>process.exit(1))'"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ---------------------------------------------------------------------------
  # WhatsApp Bridge — whatsapp-web.js sidecar
  # ---------------------------------------------------------------------------
  whatsapp-bridge:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.whatsapp-bridge
    restart: unless-stopped
    environment:
      API_URL: http://api:8000
      API_TOKEN: ${WHATSAPP_BRIDGE_TOKEN:-}
    volumes:
      - whatsapp_session:/app/.wwebjs_auth
    networks:
      - backend
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN   # Required by Puppeteer/Chromium sandbox
    security_opt:
      - no-new-privileges:true
    profiles:
      - whatsapp

  # ---------------------------------------------------------------------------
  # Cloudflare Tunnel — zero-trust external access
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:2025.2.1
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    networks:
      - frontend
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      traefik:
        condition: service_healthy

# =============================================================================
# Networks — isolated by function
# =============================================================================
networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

  backend:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.1.0/24

  data:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.2.0/24

# =============================================================================
# Volumes — persistent data
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  traefik_certs:
  openclaw_config:
  openclaw_workspace:
  whatsapp_session:
